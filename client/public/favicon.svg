<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Neural synapse nodes and connections -->
  <!-- Central hub -->
  <circle cx="32" cy="32" r="5" fill="white" opacity="0.95"/>
  <!-- Top node -->
  <circle cx="32" cy="14" r="3.5" fill="url(#glow)"/>
  <line x1="32" y1="18" x2="32" y2="27" stroke="white" stroke-width="1.8" opacity="0.7" stroke-linecap="round"/>
  <!-- Bottom node -->
  <circle cx="32" cy="50" r="3.5" fill="url(#glow)"/>
  <line x1="32" y1="37" x2="32" y2="46" stroke="white" stroke-width="1.8" opacity="0.7" stroke-linecap="round"/>
  <!-- Top-left node -->
  <circle cx="16" cy="20" r="3" fill="url(#glow)"/>
  <line x1="19" y1="22" x2="28" y2="29" stroke="white" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Top-right node -->
  <circle cx="48" cy="20" r="3" fill="url(#glow)"/>
  <line x1="45" y1="22" x2="36" y2="29" stroke="white" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Bottom-left node -->
  <circle cx="16" cy="44" r="3" fill="url(#glow)"/>
  <line x1="19" y1="42" x2="28" y2="35" stroke="white" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Bottom-right node -->
  <circle cx="48" cy="44" r="3" fill="url(#glow)"/>
  <line x1="45" y1="42" x2="36" y2="35" stroke="white" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
  <!-- Outer ring pulses -->
  <circle cx="32" cy="32" r="16" stroke="white" stroke-width="0.8" opacity="0.15" fill="none"/>
  <circle cx="32" cy="32" r="22" stroke="white" stroke-width="0.5" opacity="0.08" fill="none"/>
</svg>
